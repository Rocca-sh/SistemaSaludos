<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Pantalla AutoZone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #111111;
      overflow: hidden;
    }

    /* Badge conexión (movido a la esquina inferior para limpiar el header) */
    .conn-badge {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid #e0e0e0;
      background: #ffffff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555555;
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.05);
      z-index: 20;
    }

    .conn-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    .connecting .conn-dot { background: #FF6600; } /* Naranja AutoZone */
    .connected .conn-dot { background: #4caf87; }
    .error .conn-dot { background: #E31837; }     /* Rojo AutoZone */

    /* Main Container */
    #main {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 40px;
      z-index: 1;
    }

    /* ── IDLE ── */
    #screen-idle {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    .idle-logo {
      width: 100%;
      max-width: 600px;
      height: auto;
      max-height: 40vh;
      object-fit: contain;
      margin-bottom: 60px;
    }

    .idle-saludo {
      font-size: 4rem; /* > 24px */
      font-weight: bold;
      color: #E31837; /* Rojo AutoZone */
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .idle-sub {
      font-size: 1.8rem;
      color: #FF6600; /* Naranja AutoZone */
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ── MENSAJE ── */
    #screen-message {
      display: none;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      text-align: center;
      width: 100%;
    }

    .msg-line {
      width: 120px;
      height: 6px;
      background: -webkit-linear-gradient(left, #E31837, #FF6600);
      background: linear-gradient(90deg, #E31837, #FF6600);
      margin-bottom: 40px;
    }

    .msg-bienvenido {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #FF6600;
      margin-bottom: 15px;
    }

    .msg-nombre {
      font-size: 5.5rem;
      font-weight: bold;
      line-height: 1.1;
      color: #111111;
      margin-bottom: 20px;
      word-break: break-word;
      white-space: pre-line;
      max-width: 90vw;
    }

    .msg-cargo {
      font-size: 2rem;
      font-weight: normal;
      color: #555555;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .msg-empresa-bloque {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 20px 40px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #fafafa;
      margin-bottom: 40px;
    }

    .msg-empresa-logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-right: 20px;
    }

    .msg-empresa-nombre {
      font-size: 1.8rem;
      font-weight: bold;
      color: #333333;
    }

    .msg-visita-label {
      font-size: 1.2rem;
      font-weight: bold;
      color: #aaaaaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .msg-anfitrion {
      font-size: 2rem;
      font-weight: bold;
      color: #111111;
      margin-top: 10px;
    }

    /* ── CLEAR ── */
    #screen-clear {
      display: none;
      text-align: center;
    }

    .clear-check {
      font-size: 100px;
      color: #4caf87;
      margin-bottom: 20px;
    }

    .clear-text {
      font-size: 2.5rem;
      font-weight: bold;
      color: #333333;
    }

    /* Botones Acción (si llegaran a usarse luego) */
    .btn-action {
      background: #E31837; /* Rojo AutoZone */
      color: #FFFFFF;
      font-size: 24px;
      padding: 20px 50px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 30px;
    }

    /* Animaciones suaves */
    .fade-in {
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .slide-in {
      opacity: 1;
      transition: opacity 0.4s ease;
    }
  </style>
</head>

<body>

  <!-- Badge de enlace (ahora oculto estéticamente o empujado abajo) -->
  <div class="conn-badge connecting" id="conn-badge">
    <div class="conn-dot"></div>
    <span id="conn-texto">Conectando...</span>
  </div>

  <div id="main">

    <!-- ── IDLE / ESPERA (AutoZone Dynamic) ── -->
    <div id="screen-idle">
      <!-- Ahora la estrella da lugar directamente a la marca centralizada gigantesca -->
      <img src="/logo/png-transparent-autozone-logo-icons-logos-emojis-car-logos.png" alt="AutoZone Logo" class="idle-logo">
      <div class="idle-saludo" id="idle-saludo-texto">¡Bienvenidos!</div>
      <div class="idle-sub">Descubre lo Mejor</div>
    </div>

    <!-- ── PANTALLA MENSAJE PRINCIPAL ── -->
    <div id="screen-message">
      <div class="msg-line"></div>
      <div class="msg-bienvenido">Bienvenido</div>
      <div class="msg-nombre" id="msg-nombre"></div>
      <div class="msg-cargo" id="msg-cargo"></div>
      <div class="msg-empresa-bloque" id="msg-empresa-bloque" style="display:none">
        <img class="msg-empresa-logo" id="msg-empresa-logo" src="" alt="" style="display:none">
        <div class="msg-empresa-nombre" id="msg-empresa-nombre"></div>
      </div>
      <div class="msg-visita-label">Visita a</div>
      <div class="msg-anfitrion" id="msg-anfitrion"></div>
    </div>

    <!-- ── PANTALLA CLEAR (OK) ── -->
    <div id="screen-clear">
      <div class="clear-check">&#10003;</div>
      <div class="clear-text">Pantalla lista</div>
    </div>

  </div>

  <script>
    // ════════════════════════════════════════════════
    //  VARIABLES Y ENLACE BASE
    // ════════════════════════════════════════════════
    var SERVER_URL = window.location.origin;
    var WS_URL = SERVER_URL.replace("http", "ws") + "/hub";
    var SCREEN_NAME = (function () {
      try {
        var q = window.location.search;
        if (q) {
          var pairs = q.substring(1).split("&");
          for (var i = 0; i < pairs.length; i++) {
            var kv = pairs[i].split("=");
            if (kv[0] === "nombre") return decodeURIComponent(kv[1]);
          }
        }
      } catch (e) { }
      return "AutoZone Kiosk"; 
    })();

    // ════════════════════════════════════════════════
    //  1. GENERACIÓN DE MENSAJERÍA DINÁMICA (Carga SERVIDOR)
    // ════════════════════════════════════════════════
    var mensajesRegionales = ["Descubriendo AutoZone..."];

    function cargarSaludosDelServidor() {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", SERVER_URL + "/api/greetings", true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              var parseado = JSON.parse(xhr.responseText);
              if (parseado && parseado.length > 0) mensajesRegionales = parseado;
            } catch(e) {}
          }
        };
        xhr.send();
      } catch(e) {}
    }

    cargarSaludosDelServidor();
    setInterval(cargarSaludosDelServidor, 30000); // Sincroniza cada 30 seg

    // ════════════════════════════════════════════════
    //  2. LÓGICA DE GUARDADO / SELECCIÓN DE SALUDO
    // ════════════════════════════════════════════════
    var gestorSaludos = {
      saludoActivo: "",
      historial: [],
      // Función sencilla requerida (compatible nativa)
      guardarSaludoParaEnvio: function(saludoTexto) {
        this.saludoActivo = saludoTexto;
        var infoSaludo = {
          texto: saludoTexto,
          fecha: new Date().getTime(),
          pantalla: SCREEN_NAME
        };
        
        this.historial.push(infoSaludo);
        
        // (Preparación) Aquí enviaríamos al servidor, sea por AJAX o WebSocket
        // Ejemplo genérico si quisiéramos inyectarlo por signalR:
        // invocar("ReportarSaludoEnPantalla", [infoSaludo]);
      }
    };

    function rotarSaludoRegional() {
      if(document.getElementById("screen-idle").style.display === "none") return;
      
      var rnd = Math.floor(Math.random() * mensajesRegionales.length);
      var nuevo = mensajesRegionales[rnd];
      
      var textoEl = document.getElementById("idle-saludo-texto");
      if(textoEl) {
        // Pequeño guiño de opacidad (amigable y sin keyframes pesados)
        textoEl.style.opacity = 0;
        setTimeout(function(){
          textoEl.textContent = nuevo;
          textoEl.style.opacity = 1;
        }, 300);
      }

      // Guardamos la iteración validando el requerimiento del sistema
      gestorSaludos.guardarSaludoParaEnvio(nuevo);
    }
    
    // Rota saludo cada 12 segundos
    setInterval(rotarSaludoRegional, 12000);
    rotarSaludoRegional();

    // ════════════════════════════════════════════════
    //  3. DISPLAY Y PANTALLAS (LEGACY COMPATIBLE)
    // ════════════════════════════════════════════════
    function mostrarPantalla(nombre) {
      var idle = document.getElementById("screen-idle");
      var message = document.getElementById("screen-message");
      var clear = document.getElementById("screen-clear");

      idle.style.display = "none";
      message.style.display = "none";
      clear.style.display = "none";

      if (nombre === "idle") {
        idle.style.display = "-webkit-flex";
        idle.style.display = "flex";
        idle.className = "fade-in";
      } else if (nombre === "message") {
        message.style.display = "-webkit-flex";
        message.style.display = "flex";
        message.className = "slide-in";
      } else if (nombre === "clear") {
        clear.style.display = "-webkit-flex";
        clear.style.display = "flex";
        clear.className = "fade-in";
      }
    }

    function setConn(estado, texto) {
      var badge = document.getElementById("conn-badge");
      if(badge) badge.className = "conn-badge " + estado;
      var textoEl = document.getElementById("conn-texto");
      if(textoEl) textoEl.textContent = texto;
    }

    // ════════════════════════════════════════════════
    //  4. PROCESAR JSON RECIBIDO VIA HUB
    // ════════════════════════════════════════════════
    function procesarMensajeData(data) {
      if (!data) return;
      var type = data.type;
      var payload = data.payload;

      if (type === "limpiar") {
        mostrarPantalla("clear");
        setTimeout(function () { mostrarPantalla("idle"); }, 3000);
        return;
      }
      if (type === "saludoVisitante" || type === "saludoGrupo") {
        mostrarSaludo(payload, type);
        return;
      }
      if (type === "bienvenida") {
        mostrarSaludo({
          nombre: payload.nombre || "",
          cargo: payload.cargo || "",
          empresa: payload.empresa || "",
          anfitrion: payload.anfitrion || ""
        }, "saludoVisitante");
        return;
      }
      if (type === "texto") {
        mostrarTextoLibre(payload);
        return;
      }
      if (type === "aviso") {
        mostrarAviso(payload);
        return;
      }
    }

    function mostrarSaludo(payload, type) {
      if (!payload) return;

      var nombreTexto = "";
      if (type === "saludoGrupo" && payload.visitantes && payload.visitantes.length) {
        var arr = [];
        for (var i = 0; i < payload.visitantes.length; i++) {
          arr.push(payload.visitantes[i].nombre || payload.visitantes[i].name || "");
        }
        nombreTexto = arr.join("\n");
      } else {
        nombreTexto = payload.nombre || payload.name || payload.visitante || "Visitante";
      }

      var nombreEl = document.getElementById("msg-nombre");
      nombreEl.textContent = nombreTexto;

      var lineas = nombreTexto.split("\n").length;
      if (lineas >= 4) nombreEl.style.fontSize = "3rem";
      else if (lineas >= 3) nombreEl.style.fontSize = "4rem";
      else if (lineas >= 2) nombreEl.style.fontSize = "5rem";
      else nombreEl.style.fontSize = "6rem";

      document.getElementById("msg-cargo").textContent = 
        payload.cargo || payload.role || payload.puesto || "";

      var empresa = payload.empresa || payload.company || "";
      var logo = payload.logo || payload.logoUrl || "";
      var bloque = document.getElementById("msg-empresa-bloque");
      
      if (empresa) {
        document.getElementById("msg-empresa-nombre").textContent = empresa;
        var logoImg = document.getElementById("msg-empresa-logo");
        if (logo) { logoImg.src = logo; logoImg.style.display = "inline-block"; }
        else { logoImg.style.display = "none"; }
        bloque.style.display = "-webkit-flex";
        bloque.style.display = "flex";
      } else {
        bloque.style.display = "none";
      }

      document.getElementById("msg-anfitrion").textContent =
        payload.anfitrion || payload.host || payload.para || "";

      mostrarPantalla("message");
    }

    function mostrarTextoLibre(payload) {
      if (!payload) return;
      document.getElementById("msg-nombre").textContent = payload.titulo || "";
      document.getElementById("msg-nombre").style.fontSize = "4.5rem";
      document.getElementById("msg-cargo").textContent = payload.subtexto || "";
      document.getElementById("msg-empresa-bloque").style.display = "none";
      document.getElementById("msg-anfitrion").textContent = "";
      document.getElementById("msg-bienvenido").textContent = "";
      mostrarPantalla("message");
    }

    function mostrarAviso(payload) {
      if (!payload) return;
      document.getElementById("msg-nombre").textContent = (payload.icono || "📢") + " " + (payload.texto || "");
      document.getElementById("msg-nombre").style.fontSize = "4rem";
      document.getElementById("msg-cargo").textContent = payload.sub || "";
      document.getElementById("msg-empresa-bloque").style.display = "none";
      document.getElementById("msg-anfitrion").textContent = "";
      document.getElementById("msg-bienvenido").textContent = "Aviso";
      mostrarPantalla("message");
    }

    // ════════════════════════════════════════════════
    //  5. MOTOR WEBSOCKET "SIGNALR CRUDO" (SIN LIBRERÍA)
    // ════════════════════════════════════════════════
    var ws = null;
    var wsReady = false;
    var retryTimer = null;
    var RETRY_DELAY = 3000;
    var SEP = String.fromCharCode(30);

    function negotiate() {
      var xhr = new XMLHttpRequest();
      xhr.open("POST", SERVER_URL + "/hub/negotiate?negotiateVersion=1", true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var resp = JSON.parse(xhr.responseText);
              var token = resp.connectionToken || resp.connectionId || "";
              connectWS(token);
            } catch (e) { connectWS(""); }
          } else {
            setConn("error", "Servidor Ausente");
            retryTimer = setTimeout(negotiate, RETRY_DELAY);
          }
        }
      };
      xhr.onerror = function () {
        setConn("error", "Sin Red");
        retryTimer = setTimeout(negotiate, RETRY_DELAY);
      };
      xhr.send("{}");
    }

    function connectWS(token) {
      var url = WS_URL;
      if (token) url += "?id=" + encodeURIComponent(token);
      try { ws = new WebSocket(url); } catch (e) {
        setConn("error", "Navegador No Soportado");
        return;
      }
      ws.onopen = function () { ws.send('{"protocol":"json","version":1}' + SEP); };
      ws.onmessage = function (evt) {
        var raw = evt.data;
        var partes = raw.split(SEP);
        for (var i = 0; i < partes.length; i++) {
          var parte = partes[i].trim();
          if (!parte) continue;
          manejarMensajeWS(parte);
        }
      };
      ws.onclose = function () {
        wsReady = false;
        setConn("error", "Caída WS");
        retryTimer = setTimeout(negotiate, RETRY_DELAY);
      };
      ws.onerror = function () {
        wsReady = false;
        setConn("error", "Falla WS");
      };
    }

    function manejarMensajeWS(texto) {
      var msg;
      try { msg = JSON.parse(texto); } catch (e) { return; }
      if (msg.type === 6) { wsSend({ type: 6 }); return; }
      if (msg.type === undefined) {
        if (msg.error) { setConn("error", "Bloqueado"); return; }
        wsReady = true;
        setConn("connected", "En línea");
        invocar("RegistrarPantalla", [SCREEN_NAME]);
        return;
      }
      if (msg.type === 1) {
        var target = (msg.target || "").toLowerCase();
        if (target === "actualizarinfo") {
          var arg = msg.arguments && msg.arguments[0];
          if (!arg) return;
          var data;
          try { data = typeof arg === "string" ? JSON.parse(arg) : arg; } catch (e) { return; }
          procesarMensajeData(data);
          return;
        }
      }
    }

    var invocacionId = 0;
    function invocar(metodo, args) {
      if (!wsReady || !ws || ws.readyState !== 1) return;
      var msg = { type: 1, invocationId: String(invocacionId++), target: metodo, arguments: args || [] };
      wsSend(msg);
    }
    function wsSend(obj) {
      try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj) + SEP); } catch (e) { }
    }

    // ════════════════════════════════════════════════
    //  INICIO Y SECUENCIA DE ARRANQUE
    // ════════════════════════════════════════════════
    mostrarPantalla("idle");
    setConn("connecting", "Enlazando...");
    negotiate();
  </script>
</body>
</html>
