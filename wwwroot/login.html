<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Control de Pantallas</title>
    <!-- Bootstrap para utilidades básicas (opcional, pero útil) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container shadow-lg">
            
            <div class="login-header text-center">
                <img src="/logo/ideologo.png" alt="Logo de la Empresa" class="login-logo mb-3" onerror="this.src='https://via.placeholder.com/150x50?text=LOGO'">
                <h4 class="fw-bold text-dark mb-1">Bienvenido de nuevo</h4>
                <p class="text-muted small">Ingresa tus credenciales para administrar las pantallas</p>
            </div>

            <form id="loginForm" class="login-form">
                
                <div class="form-group mb-3">
                    <label for="username" class="form-label small fw-semibold text-secondary">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label for="password" class="form-label small fw-semibold text-secondary">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 border-end-0" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                        <span class="input-group-text bg-light input-group-text-action text-muted" id="togglePasswordBtn" style="cursor: pointer;">
                            <i class="fa-solid fa-eye" id="togglePasswordIcon"></i>
                        </span>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-login py-2 fw-semibold" id="loginBtn">
                        <span id="loginBtnText">Iniciar Sesión</span>
                        <span class="spinner-border spinner-border-sm d-none" id="loginSpinner" role="status" aria-hidden="true"></span>
                    </button>
                </div>
                
                <div id="loginError" class="alert alert-danger mb-0 d-none text-center small py-2" role="alert">
                    Usuario o contraseña incorrectos.
                </div>

            </form>

        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/login.js"></script>
</body>
</html>
